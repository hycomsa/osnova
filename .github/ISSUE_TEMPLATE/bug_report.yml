name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please **do not** report security
        vulnerabilities here — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I ..., I expected ..., but ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Viewer / reading
        - Editor
        - Comments / approvals / presence
        - AI incorporation
        - Access control / views / roles
        - Git sync / history / conflicts
        - Notifications
        - Admin / workspace setup
        - Other
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. v0.1.0 or commit sha
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Browser, OS, Node version, deployment (local/prod) — as relevant.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Console or server logs and screenshots. Redact any secrets.
      render: shell
    validations:
      required: false
